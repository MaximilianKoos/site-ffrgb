name: Build Gluon ffrgb v2023.2.6

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-x86-64:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential gawk unzip rsync file wget git subversion python3 \
            libncurses-dev zlib1g-dev libssl-dev qemu-utils ca-certificates

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: |
            dl
            openwrt/dl
          key: ${{ runner.os }}-gluon-${{ hashFiles('**/modules', '**/site.mk', '**/site.conf', '**/site.conf.d/**/*', '.github/workflows/build-gluon-ffrgb.yml') }}-v2023.2.6-x86-64
          restore-keys: |
            ${{ runner.os }}-gluon-

      - name: Fix script permissions
        run: |
          chmod +x scripts/apply_patches.sh || true
          chmod +x scripts/*.sh || true

      - name: Build firmware
        env:
          GLUON_GIT_REF: v2023.2.6
          GLUON_TARGET: x86-64
        run: |
          make GLUON_GIT_REF=${GLUON_GIT_REF} GLUON_TARGET=${GLUON_TARGET} V=s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gluon-ffrgb-v2023.2.6-x86-64
          path: output/images/
          if-no-files-found: error
          retention-days: 14
